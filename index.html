<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary SPA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
    <h1>Wordly Dictionary</h1>
    <p>Welcome to the Wordly Dictionary.</p>
    </header>
    <main>
        <section class="search-section">
            <form id="search-form">
                <input type="text" id="search-input" placeholder="Enter a word..." aria-label="Dictionary Search Input">
                <button type="submit">Search</button>
            </form>
            
        </section>
        <section class="results-section">
            <h2>Search Results</h2>
            <div id="results-container"></div>
        </section>
        <section class="history-section">
            <h2>Search Words</h2>
            <ul id="history-list"></ul>
        </section>
        <section class="favorites-section">
            <h2>Favorite Words</h2>
            <ul id="favorites-list"></ul>
        </section>
    </main>
    <script src="script.js"></script>
    
</body>
</html>
